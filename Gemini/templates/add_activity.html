{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h2>Log Environmental Action</h2>
    <form action="{{ url_for('add_activity') }}" method="POST">
        <div class="form-group">
            <label for="activity_type">Select Tracked Activity</label>
            <select id="activity_type" name="activity_type" required>
                <option value="" disabled selected>Choose your action option...</option>
                {% for option in options %}
                    <option value="{{ option }}">{{ option }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="description">Activity Details / Notes</label>
            <textarea id="description" name="description" rows="3" placeholder="Optional notes (e.g. details on items recycled, distance traveled)"></textarea>
        </div>
        <div class="form-buttons-row">
            <button type="submit" class="btn btn-primary">Save Log Entry</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
