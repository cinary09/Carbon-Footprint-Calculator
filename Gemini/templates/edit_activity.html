{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h2>Edit Logged Activity</h2>
    <form action="{{ url_for('edit_activity', activity_id=activity.id) }}" method="POST">
        <div class="form-group">
            <label for="activity_type">Select Tracked Activity</label>
            <select id="activity_type" name="activity_type" required>
                {% for option in options %}
                    <option value="{{ option }}" {% if activity.activity_type == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="description">Activity Details / Notes</label>
            <textarea id="description" name="description" rows="3">{{ activity.description }}</textarea>
        </div>
        <div class="form-buttons-row">
            <button type="submit" class="btn btn-primary">Update Entry</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
