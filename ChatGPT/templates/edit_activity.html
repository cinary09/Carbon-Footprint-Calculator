{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h1>Edit activity</h1>
    <form method="post" class="auth-form">
        <label for="activity_type">Activity</label>
        <select id="activity_type" name="activity_type" required>
            {% for activity_name, points in activity_points.items() %}
                <option value="{{ activity_name }}" {% if activity.activity_type == activity_name %}selected{% endif %}>
                    {{ activity_name }} ({{ points }} points)
                </option>
            {% endfor %}
        </select>

        <label for="activity_date">Date</label>
        <input id="activity_date" name="activity_date" type="date" value="{{ activity.activity_date }}" required>

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="4">{{ activity.notes }}</textarea>

        <button class="button" type="submit">Update activity</button>
    </form>
</section>
{% endblock %}
