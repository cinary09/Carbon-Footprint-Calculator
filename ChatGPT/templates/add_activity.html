{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h1>Add activity</h1>
    <form method="post" class="auth-form">
        <label for="activity_type">Activity</label>
        <select id="activity_type" name="activity_type" required>
            <option value="">Select an activity</option>
            {% for activity_name, points in activity_points.items() %}
                <option value="{{ activity_name }}">{{ activity_name }} ({{ points }} points)</option>
            {% endfor %}
        </select>

        <label for="activity_date">Date</label>
        <input id="activity_date" name="activity_date" type="date" value="{{ today }}" required>

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="4" placeholder="Optional details about the activity"></textarea>

        <button class="button" type="submit">Save activity</button>
    </form>
</section>
{% endblock %}
