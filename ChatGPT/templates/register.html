{% extends "base.html" %}
{% block content %}
<section class="auth-card card">
    <h1>Create account</h1>
    <form method="post" class="auth-form">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" minlength="3" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="6" required>

        <label for="confirm_password">Confirm password</label>
        <input id="confirm_password" name="confirm_password" type="password" minlength="6" required>

        <button class="button" type="submit">Register</button>
    </form>
    <p class="muted">Already have an account? <a href="{{ url_for('login') }}">Login here</a>.</p>
</section>
{% endblock %}
