<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Climate Action Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <a href="{{ url_for('index') }}"> Climate Action Tracker</a>
            </div>
            <ul class="navbar-menu">
                <li><a href="{{ url_for('index') }}" class="nav-link">Home</a></li>
                {% if session.user_id %}
                    <li><a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a></li>
                    <li><a href="{{ url_for('statistics') }}" class="nav-link">Statistics</a></li>
                    <li><a href="{{ url_for('logout') }}" class="nav-link logout">Logout</a></li>
                {% else %}
                    <li><a href="{{ url_for('login') }}" class="nav-link">Login</a></li>
                    <li><a href="{{ url_for('register') }}" class="nav-link register">Register</a></li>
                {% endif %}
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2024 Climate Action Tracker. Taking action for our planet.</p>
    </footer>
</body>
</html>
