{% extends "base.html" %}

{% block title %}Login - Climate Action Tracker{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h1>Sign In</h1>
        <p class="form-subtitle">Access your climate action dashboard</p>

        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" class="form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required value="{{ username or '' }}">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <p class="form-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Create one here</a>
        </p>
    </div>
</div>
{% endblock %}
